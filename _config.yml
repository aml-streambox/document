title: StreamBox
description: A Amlogic A311D2 based video capture, encoder and streaming system.
theme: minima
baseurl: "/document"
url: "https://aml-streambox.github.io"

# Header pages for navigation (in order) - only include main English pages
header_pages:
  - index.md
  - index/index_en.md
  - build-guide/build-guide_en.md
  - setup-guide/setup-guide_en.md
  - driver-modifications/driver-modifications_en.md
  - custom-software/custom-software_en.md
  - source-code-reference/source-code-reference_en.md
  - faq-and-roadmap/faq-and-roadmap_en.md

# Exclude files from processing
exclude:
  - .git/
  - .gitignore
  - README.md

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Minima theme settings
minima:
  skin: auto
  social_links:
    - { platform: github, user_url: "https://github.com/aml-streambox/yocto" }
